<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Калькулятор шансов на грант — DOSTYQ ONLINE</title>
  <link rel="icon" type="image/webp" href="assets/logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Ставим тему ДО отрисовки страницы, чтобы не мигало неправильной темой.
    // По умолчанию — светлая (лого сделано под светлый фон), тёмная только
    // если пользователь сам её выбрал в прошлый раз.
    document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
  </script>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="#/" class="logo"><img src="assets/logo.webp" alt="Dostyq Online" /></a>
      <nav class="site-nav">
        <a href="#/" data-route="calculator" data-i18n="nav.calculator">Калькулятор</a>
        <a href="#/specialties" data-route="specialties" data-i18n="nav.specialties">Специальности</a>
        <a href="#/universities" data-route="universities" data-i18n="nav.universities">Вузы</a>
        <button id="lang-toggle" class="lang-toggle" type="button" aria-label="Тілді ауыстыру / Переключить язык">ҚАЗ</button>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Переключить тему" title="Светлая/тёмная тема"></button>
      </nav>
    </div>
  </header>
  <main class="container" id="app"></main>
  <script src="app.js"></script>
</body>
</html>
