<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Калькулятор шансов на грант — DOSTYQ ONLINE</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Ставим тему ДО отрисовки страницы, чтобы не мигало неправильной темой.
    // По умолчанию — светлая (лого сделано под светлый фон), тёмная только
    // если пользователь сам её выбрал в прошлый раз.
    document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
  </script>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="#/" class="logo"><img src="assets/logo.webp" alt="Dostyq Online" /></a>
      <nav class="site-nav">
        <a href="#/" data-route="calculator">Калькулятор</a>
        <a href="#/specialties" data-route="specialties">Специальности</a>
        <a href="#/universities" data-route="universities">Вузы</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Переключить тему" title="Светлая/тёмная тема"></button>
      </nav>
    </div>
  </header>
  <main class="container" id="app"></main>
  <footer class="site-footer">
    Данные: официальный список обладателей грантов 2023–2025 годов, приказы о распределении грантов 2024–2027,
    testcenter.kz, eduser.app. Оценки — эвристика на основе тренда прошлых лет, не гарантия поступления.
  </footer>
  <script src="app.js"></script>
</body>
</html>
